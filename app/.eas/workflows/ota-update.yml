name: OTA Update (publica el JS tras cada push)

# Se dispara con cada push a main. Publica el bundle JS de la app por OTA, sin
# pasar por la tienda. runtimeVersion es un string FIJO en app/app.json (no
# fingerprint): el update solo llega a instalaciones cuyo binario declara ese
# mismo string. Regla: si un cambio toca lo nativo (modulo nuevo, SDK, plugin,
# permiso, icono empaquetado), sube el string a mano y haz un build nuevo;
# si no lo subes, las instalaciones viejas cargarian JS que referencia codigo
# nativo ausente y la app crashea al abrir.
#
# Usa el job built-in `type: update`: trae el eas-cli y la autenticacion del
# proyecto ya resueltas, corre checkout + npm install (postinstall sync que
# regenera app/src/contenido) y publica con `eas update` usando el mensaje del
# commit. Antes esto era un step `run: eas update ...` que fallaba con
# "eas: command not found" porque el CLI no esta en el PATH de un run crudo.
on:
  push:
    branches: ['main']

jobs:
  publicar_ota:
    name: Publicar update de produccion
    type: update
    params:
      branch: production
