    <!-- JSON-LD #2: FAQPage -->
    <!-- MANTENIMIENTO: si editas faqData.js, actualizar también este JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cómo saber si la terapia es para mí?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Si llevas más de un par de semanas con algo que te incomoda (ansiedad, tristeza, una decisión difícil, una sensación que no logras nombrar), vale la pena conversarlo. La primera sesión es para conocernos y entender juntos qué te trae. Si después no quieres continuar, no hay compromiso."
          }
        },
        {
          "@type": "Question",
          "name": "¿La terapia online funciona igual que la presencial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, para la mayoría de los procesos que llegan a consulta. Varios metaanálisis que reúnen cientos de estudios concluyen que la terapia por videollamada logra resultados equivalentes a la presencial, y que el beneficio es especialmente claro en ansiedad y depresión cuando se trabaja con terapia cognitivo-conductual. Lo importante es que tengas un lugar privado donde hablar tranquilo y una conexión estable. Hay situaciones específicas en las que recomiendo terapia presencial. Si fuera tu caso, te lo diría con honestidad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta una sesión?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hay dos modalidades: sesión particular por $15.000, o sesión con bono Fonasa Modalidad Libre Elección por $5.570 (este último disponible para afiliados Fonasa de tramos B, C y D, bajo los códigos 09 08 101, 09 08 102 y 09 08 103). Misma duración y dedicación en ambos casos. La forma de pago no cambia lo que pasa en la sesión."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo compro un bono Fonasa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes comprarlo online desde Mi Fonasa con tu ClaveÚnica, o presencial en sucursales Fonasa, Caja Los Andes, Caja Los Héroes, ChileAtiende y Servipag. Lo importante: compra el bono ANTES de la sesión y envíame el folio por WhatsApp para validarlo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa si tengo Isapre o un seguro complementario?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes atenderte en modalidad particular por $15.000: recibes una boleta de honorarios por la atención psicológica, que te sirve para solicitar reembolso en tu Isapre o seguro complementario, según la cobertura de tu plan. El bono Fonasa es solo para afiliados de Fonasa y no incluye boleta: son vías separadas. Si no conoces tu cobertura, confírmala con tu Isapre o aseguradora antes de agendar."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa en la primera sesión?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nos conocemos. Me cuentas qué te trae, con el detalle que tú quieras dar, sin presión. Te explico cómo trabajo. Exploramos qué necesitas. Si al final de los 45 minutos sentimos que tiene sentido seguir, definimos un plan. Si no, también está bien."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito instalar algo para la videollamada?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Las sesiones son a través de Doxy.me, plataforma de teleconsulta certificada por Fonasa. Se abre desde cualquier navegador moderno (Chrome, Safari, Firefox, Edge). Recibes un link, le das clic, das permiso a cámara y micrófono, y entras a la sala de espera. Yo te admito cuando estoy listo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Mis datos están protegidos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. La plataforma de videollamadas está certificada por Fonasa y la conexión va cifrada. No grabo las sesiones. La ficha clínica se mantiene bajo los mismos estándares que una atención presencial, conforme a la Ley 21.541 de telemedicina, a la Ley 21.331 sobre derechos en la atención de salud mental y a la normativa de protección de datos vigente en Chile."
          }
        },
        {
          "@type": "Question",
          "name": "¿Con qué frecuencia se hacen las sesiones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Lo habitual es semanal o quincenal, según el momento del proceso. Lo conversamos en la segunda sesión y lo ajustamos a tu ritmo y posibilidades."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo cancelar o reagendar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Puedes reagendar desde el mismo email de confirmación hasta 6 horas antes de la sesión sin costo. Cancelaciones con menos de 6 horas se reagendan caso a caso."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa si tengo una crisis fuera del horario de sesión?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Las sesiones son agendadas y no funciono como servicio de urgencia. Si estás en riesgo o tienes una crisis fuera de horario, por favor contacta Salud Responde 600 360 7777 (gratuito, 24/7) o acude a la urgencia más cercana. En la siguiente sesión podemos trabajar lo que ocurrió."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es \"Respira conmigo\"?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Es una herramienta gratuita de este sitio, en psicologojuanfernandez.cl/respira: una figura que se expande y se recoge para guiar tu inhalación y tu exhalación a un ritmo lento, cercano a 6 respiraciones por minuto. Esta técnica, conocida como respiración coherente, sincroniza la respiración con el ritmo cardíaco y puede ayudar con la autoregulación emocional, el estrés, la ansiedad o la concentración. La inicias y la pausas cuando quieras, y puedes usarla el tiempo que te acomode (entre 3 y 5 minutos funciona bien para la mayoría). Es un apoyo para la relajación: no es un tratamiento ni reemplaza un proceso de psicoterapia. Si sientes mareo o incomodidad, detente y vuelve a tu ritmo natural."
          }
        }
      ]
    }
    </script>
