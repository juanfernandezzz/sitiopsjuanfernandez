<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3F5B4A" />

    <!-- Google tag (gtag.js): mide la conversion de reserva por carga de pagina
         y el evento GA4 'cita_agendada'. Esta pagina es de las publicas que
         llevan la etiqueta; las paginas legales y clinicas no la llevan. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RWPN108JJE');
      gtag('config', 'AW-18178105505');
      // C31: gtag se carga tras window.load; la cola dataLayer conserva la
      // conversion de reserva registrada antes de que cargue el script.
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-RWPN108JJE';
          document.head.appendChild(s);
        }, 0);
      });
    </script>

    <!-- Umami (C37): medicion sin cookies, complementaria a la etiqueta de
         Google. Carga tras window.load, igual que gtag, para no ocupar el
         hilo principal antes del primer paint. El identificador del sitio lo
         inyecta el ciclo de aplicacion; si esta vacio, el script no se carga
         y el sitio funciona igual. -->
    <script>
      window.UMAMI_WEBSITE_ID = '7c99c23d-9dce-4756-a3fb-7fe4df9b88e4';
      window.umamiCola = window.umamiCola || [];
      window.addEventListener('load', function () {
        setTimeout(function () {
          if (!window.UMAMI_WEBSITE_ID) return;
          var u = document.createElement('script');
          u.defer = true;
          u.src = 'https://cloud.umami.is/script.js';
          u.setAttribute('data-website-id', window.UMAMI_WEBSITE_ID);
          u.onload = function () {
            try {
              if (window.umami && typeof window.umami.track === 'function') {
                window.umamiCola.forEach(function (ev) { window.umami.track(ev); });
                window.umamiCola.length = 0;
              }
            } catch (e) {}
          };
          document.head.appendChild(u);
        }, 0);
      });
    </script>
