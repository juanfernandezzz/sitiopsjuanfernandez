name: Android build (AAB firmado)

# Que hace: construye el App Bundle (.aab) firmado a partir de twa-manifest.json,
# lo publica como Release del repositorio y poda los releases antiguos dejando
# solo los 3 mas recientes. No instala nada en tu equipo. El AAB resultante es
# el que subes a Play Console.
#
# Requisito previo: haber corrido "Bootstrap keystore" una vez, de modo que
# existan los secrets UPLOAD_KEYSTORE_BASE64, UPLOAD_KEYSTORE_PASSWORD,
# UPLOAD_KEY_PASSWORD y UPLOAD_KEY_ALIAS.

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version visible (ej. 1.0.0). Sube este numero en cada release nuevo."
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Preparar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.22.5

      - name: Apuntar Bubblewrap al JDK y al Android SDK del runner
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > "$HOME/.bubblewrap/config.json"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true

      - name: Reconstruir keystore desde el secret
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/android.keystore

      - name: Fijar version visible y codigo de version
        working-directory: android
        run: |
          node -e "const fs=require('fs');const m=JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));m.appVersionName=process.env.VNAME;m.appVersionCode=parseInt(process.env.VCODE,10);fs.writeFileSync('twa-manifest.json',JSON.stringify(m,null,2));"
        env:
          VNAME: ${{ inputs.versionName }}
          VCODE: ${{ github.run_number }}

      - name: Regenerar proyecto Android desde el manifest
        working-directory: android
        run: bubblewrap update --skipVersionUpgrade

      - name: Construir AAB firmado
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Renombrar el AAB
        working-directory: android
        run: mv app-release-bundle.aab "psicojuan-${{ inputs.versionName }}-${{ github.run_number }}.aab"

      - name: Publicar Release y podar antiguos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-v${{ inputs.versionName }}-${{ github.run_number }}"
          gh release create "$TAG" \
            "android/psicojuan-${{ inputs.versionName }}-${{ github.run_number }}.aab" \
            --title "App Android $TAG" \
            --notes "AAB firmado con la upload key. Descargalo y subelo a Play Console. Genera la huella SHA-256 en Play App Signing tras la primera subida."
          # Poda: conserva solo los 3 releases android-* mas recientes
          gh release list --limit 200 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName' \
            | grep '^android-' | tail -n +4 \
            | while read -r t; do gh release delete "$t" --yes --cleanup-tag; done
