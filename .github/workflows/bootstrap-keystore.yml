name: Bootstrap keystore (una sola vez)

# Que hace: genera la clave de firma (upload key) dentro del runner, sin
# instalar nada en tu equipo, la guarda como secrets del repositorio y deja
# un respaldo cifrable como artifact de 1 dia para que lo lleves a tu gestor
# de contrasenas. Despues de correrlo una vez, no se vuelve a usar.
#
# Requisito previo: crea un fine grained PAT con permiso "Secrets: Read and
# write" sobre este repositorio y guardalo como secret BOOTSTRAP_TOKEN.
# Tras correr este workflow con exito, borra BOOTSTRAP_TOKEN.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar JDK (trae keytool)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generar contrasenas fuertes y solo alfanumericas
        id: pw
        run: |
          KS_PASS="$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 40)"
          KEY_PASS="$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 40)"
          echo "::add-mask::$KS_PASS"
          echo "::add-mask::$KEY_PASS"
          echo "KS_PASS=$KS_PASS" >> "$GITHUB_ENV"
          echo "KEY_PASS=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Crear keystore con keytool
        run: |
          mkdir -p backup
          keytool -genkeypair -v \
            -keystore backup/android.keystore \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 9125 \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Juan Fernandez, OU=Psicologia Clinica, O=Psicologo Juan Fernandez, L=Valparaiso, ST=Valparaiso, C=CL"

      - name: Codificar keystore en base64
        run: |
          B64="$(base64 -w0 backup/android.keystore)"
          echo "::add-mask::$B64"
          echo "KS_B64=$B64" >> "$GITHUB_ENV"

      - name: Guardar secrets en el repositorio
        env:
          GH_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
        run: |
          printf '%s' "$KS_B64"   | gh secret set UPLOAD_KEYSTORE_BASE64   --repo "$GITHUB_REPOSITORY" --body -
          printf '%s' "$KS_PASS"  | gh secret set UPLOAD_KEYSTORE_PASSWORD --repo "$GITHUB_REPOSITORY" --body -
          printf '%s' "$KEY_PASS" | gh secret set UPLOAD_KEY_PASSWORD      --repo "$GITHUB_REPOSITORY" --body -
          printf '%s' "upload"    | gh secret set UPLOAD_KEY_ALIAS         --repo "$GITHUB_REPOSITORY" --body -

      - name: Escribir respaldo legible (solo dentro del artifact)
        run: |
          {
            echo "RESPALDO DE LA CLAVE DE FIRMA (upload key)"
            echo "Guarda este contenido en tu gestor de contrasenas y borra el artifact."
            echo ""
            echo "alias: upload"
            echo "store password: $KS_PASS"
            echo "key password: $KEY_PASS"
            echo ""
            echo "El archivo android.keystore acompana este respaldo."
          } > backup/passwords.txt

      - name: Subir respaldo como artifact de 1 dia
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: backup/
          retention-days: 1
          if-no-files-found: error
