[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Redirects: los más específicos primero. Sin estos, /politica-privacidad
# y /consentimiento sin extensión caerían en el catch-all y servirían el
# index, rompiendo el SEO y el contenido legal de esas rutas.
[[redirects]]
  from   = "/politica-privacidad"
  to     = "/politica-privacidad.html"
  status = 301

[[redirects]]
  from   = "/consentimiento"
  to     = "/consentimiento.html"
  status = 301

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad globales.
# Permissions-Policy deniega cámara y micrófono a nivel sitio porque la
# videollamada vive en doxy.me, no en este dominio. El usuario sale del
# sitio para entrar a la consulta.
# CSP en modo Report-Only durante C12: si alguna directiva quedó
# incompleta, el navegador loguea pero no bloquea. La decisión de flip
# a enforced se toma en un ciclo futuro tras revisar consola.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy-Report-Only = "default-src 'self' https://cal.com https://*.cal.com https://s3.amazonaws.com; script-src 'self' 'unsafe-inline' https://cal.com https://*.cal.com https://s3.amazonaws.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cal.com https://*.cal.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cal.com https://*.cal.com https://s3.amazonaws.com; connect-src 'self' https://cal.com https://*.cal.com https://s3.amazonaws.com https://api.emailjs.com; frame-src https://cal.com https://*.cal.com; object-src 'none'; base-uri 'self'; form-action 'self' https://www.webpay.cl https://api.emailjs.com; frame-ancestors 'self'; upgrade-insecure-requests"
