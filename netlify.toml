[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Redirects: los más específicos primero. Sin estos, /politica-privacidad
# y /consentimiento sin extensión caerían en el catch-all y servirían el
# index, rompiendo el SEO y el contenido legal de esas rutas.
[[redirects]]
  from   = "/politica-privacidad"
  to     = "/politica-privacidad.html"
  status = 301

[[redirects]]
  from   = "/consentimiento"
  to     = "/consentimiento.html"
  status = 301

[[redirects]]
  from   = "/respira"
  to     = "/respira.html"
  status = 301

[[redirects]]
  from   = "/cita-agendada"
  to     = "/cita-agendada.html"
  status = 301

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad globales.
# Permissions-Policy deniega cámara y micrófono a nivel sitio porque la
# videollamada vive en doxy.me, no en este dominio. El usuario sale del
# sitio para entrar a la consulta.
# CSP en modo Report-Only durante C12: si alguna directiva quedó
# incompleta, el navegador loguea pero no bloquea. La decisión de flip
# a enforced se toma en un ciclo futuro tras revisar consola.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy-Report-Only = "default-src 'self' https://cal.com https://*.cal.com https://s3.amazonaws.com; script-src 'self' 'unsafe-inline' https://cal.com https://*.cal.com https://s3.amazonaws.com https://*.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cal.com https://*.cal.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cal.com https://*.cal.com https://s3.amazonaws.com https://*.googletagmanager.com https://*.google-analytics.com https://*.g.doubleclick.net https://www.google.com https://www.google.cl; connect-src 'self' https://cal.com https://*.cal.com https://s3.amazonaws.com https://*.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com https://*.g.doubleclick.net https://www.google.com https://www.google.cl; frame-src https://cal.com https://*.cal.com https://td.doubleclick.net; object-src 'none'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self' https://www.webpay.cl; frame-ancestors 'self'; upgrade-insecure-requests"

# Digital Asset Links: la verificacion de dominio de la app Android (TWA) exige
# que este archivo se sirva como application/json. El rewrite SPA de mas abajo no
# lo intercepta porque Netlify entrega primero los archivos reales de /dist.
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
